{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% if is_official %}Invoice{% else %}Sales Slip{% endif %} — {{ sale.reference }}</title>
<style>
    @page { size: {{ width }}mm auto; margin: 0; }

    @media screen {
        body {
            background: {% if embed %}#fff{% else %}#e5e7eb{% endif %};
            margin: 0; padding: {% if embed %}0{% else %}24px 12px{% endif %};
            min-height: 100vh; font-family: 'Courier New', monospace;
        }
        .preview-toolbar {
            max-width: {{ width }}mm; margin: 0 auto 16px auto;
            display: flex; gap: 8px; justify-content: center;
        }
        .preview-toolbar button {
            padding: 8px 16px; font-size: 13px; border: 1px solid #d1d5db;
            background: #fff; border-radius: 6px; cursor: pointer;
        }
        .preview-toolbar button.primary { background: #111827; color: #fff; border-color: #111827; }
        .preview-toolbar button.primary:hover { background: #000; }
        .receipt {
            width: {{ width }}mm; margin: 0 auto; padding: 6mm 4mm;
            background: #fff; color: #000;
            font-size: {% if width == '58' %}11px{% else %}12px{% endif %};
            box-shadow: {% if embed %}none{% else %}0 4px 14px rgba(0,0,0,0.12){% endif %};
        }
    }

    @media print {
        body { background: #fff; margin: 0; padding: 0; }
        .preview-toolbar { display: none !important; }
        .receipt {
            width: {{ width }}mm; margin: 0; padding: 6mm 4mm; box-shadow: none;
            font-family: 'Courier New', monospace;
            font-size: {% if width == '58' %}11px{% else %}12px{% endif %}; color: #000;
        }
    }

    .center  { text-align: center; }
    .right   { text-align: right; }
    .bold    { font-weight: bold; }
    .divider { border-top: 1px dashed #000; margin: 4px 0; }
    table    { width: 100%; border-collapse: collapse; }
    td       { padding: 1px 0; vertical-align: top; }
    .qty     { width: 18%; }
    .name    { width: 52%; }
    .amt     { width: 30%; text-align: right; }
    .totals td { padding: 2px 0; }
</style>
</head>
<body>
    {% if not embed %}
    <div class="preview-toolbar">
        <button class="primary" onclick="window.print()">🖨 Print</button>
        <button onclick="window.close()">Close</button>
    </div>
    {% endif %}

    <div class="receipt">
        {% if is_official %}
            {% include 'sales/_official_invoice.html' %}
        {% else %}
            {% include 'sales/_receipt_slip.html' %}
        {% endif %}
    </div>
</body>
</html>
