<div class="quickview__panel cm-panel rc-panel">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">
    <div class="card-body">

      <div class="rc-head">
        <div class="cm-title"><i class="bi bi-receipt-cutoff"></i> Receipt</div>
        <div class="rc-width" role="group" aria-label="Paper width">
          <button type="button" class="rc-width__btn {% if current_business.receipt_width == '80' %}is-active{% endif %}" data-width="80">80mm</button>
          <button type="button" class="rc-width__btn {% if current_business.receipt_width == '58' %}is-active{% endif %}" data-width="58">58mm</button>
        </div>
      </div>

      <div class="rc-frame">
        <iframe id="rcFrame"
                src="{% url 'sale-receipt' business_slug=current_business.slug sale_id=sale.id %}?width={{ current_business.receipt_width }}&embed=1"
                title="Receipt preview"></iframe>
      </div>


      <div class="cm-actions" style="margin-top:.85rem;">
        <button type="button" class="btn cm-btn cm-btn--success" id="rcPrint"><i class="bi bi-printer"></i> Print</button>
      </div>

    </div>
  </div>
</div>

<script>
(function () {
  var frame = document.getElementById('rcFrame');
  var base  = "{% url 'sale-receipt' business_slug=current_business.slug sale_id=sale.id %}";
  document.querySelectorAll('.rc-width__btn').forEach(function (b) {
    b.addEventListener('click', function () {
      document.querySelectorAll('.rc-width__btn').forEach(function (x) { x.classList.remove('is-active'); });
      b.classList.add('is-active');
      frame.src = base + '?width=' + b.dataset.width + '&embed=1';
    });
  });
  document.getElementById('rcPrint').addEventListener('click', function () {
    frame.contentWindow.focus();
    frame.contentWindow.print();   // prints ONLY the iframe = just the receipt, at its @page width
  });
})();
</script>
