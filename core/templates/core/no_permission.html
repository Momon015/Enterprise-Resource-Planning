{% extends "main.html" %}
{% block content %}

<div class="page-wrapper">
  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center;">
    
    <div style="width:80px; height:80px; background:var(--warning-light); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
      <i class="bi bi-shield-exclamation" style="font-size:2rem; color:var(--warning);"></i>
    </div>

    <h3 style="font-weight:700; color:var(--text); margin-bottom:0.5rem;">Action Not Allowed</h3>
    <p style="color:var(--muted); font-size:0.9rem; max-width:380px; margin-bottom:2rem;">
      You don't have permission to delete this record. Only the account owner can perform deletions.
    </p>

    <div style="display:flex; gap:0.75rem;">
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left sl-me-1"></i> Go Back
      </a>
      <a href="{% url 'product-list' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-house sl-me-1"></i> Go to Products
      </a>
    </div>

  </div>
</div>

{% endblock content %}
