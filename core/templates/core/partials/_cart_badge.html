<a id="cart-badge"
   href="{% url cart_url business_slug=current_business.slug %}"
   class="topbar-icon-btn topbar-cart{% if not cart_count %} is-empty{% endif %}" title="Cart" aria-label="Cart">
  <i class="bi {{ icon }}"></i>
  {% if cart_count %}
    <span class="topbar-cart__badge">{{ cart_count }}</span>
  {% endif %}
</a>



{% if messages %}
<div id="messages" hx-swap-oob="true" class="toast-container" aria-live="polite" aria-atomic="true">
{% for msg in messages %}
  <div class="toast-message toast-{{ msg.tags }}">
    {% if msg.tags == "error" %}<i class="bi bi-exclamation-circle-fill me-2"></i>
    {% elif msg.tags == "success" %}<i class="bi bi-check-circle-fill me-2"></i>
    {% elif msg.tags == "info" %}<i class="bi bi-info-circle-fill me-2"></i>
    {% elif msg.tags == "warning" %}<i class="bi bi-exclamation-triangle-fill me-2"></i>
    {% endif %}
    {{ msg }}
  </div>
{% endfor %}

</div>
{% endif %}
