<div id="cart-clear" hx-swap-oob="true">
  {% if cart_items %}
    <button hx-post="{% url clear_sessions business_slug=current_business.slug %}"
            hx-target="#cart-badge"
            hx-swap="outerHTML"
            hx-confirm="Are you sure you want to clear all items?"
            class="btn btn-sm btn-block"
            style="background:var(--danger-light); color:var(--danger); border:1px solid var(--danger-border);">
      <i class="bi bi-trash3"></i> Clear session
    </button>
  {% endif %}
</div>
