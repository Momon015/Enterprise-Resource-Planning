{% url 'settings' business_slug=current_business.slug as list_fallback %}
<div class="quickview__panel cm-panel">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">
    <div class="card-body">

      <div class="cm-head">
        <div class="cm-thumb cm-thumb--muted"><i class="bi bi-headset"></i></div>
        <div>
          <div class="cm-title">Contact support</div>
          <div class="cm-sub">We usually reply within 24 hours</div>
        </div>
      </div>

      <form hx-post="{% url 'subscription-contact' business_slug=business.slug %}"
            hx-target="#confirmBody" hx-swap="innerHTML" autocomplete="off">
        {% csrf_token %}
        <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true"
               style="position:absolute;left:-9999px;width:1px;height:1px;">

        {% if error %}<p class="cm-note cm-note--danger" style="margin-top:0;">{{ error }}</p>{% endif %}

        <div class="form-field">
          <label class="form-label" for="ct_subject">Subject</label>
          <input type="text" id="ct_subject" name="subject" maxlength="120" required
                 class="form-control form-control--polish" value="{{ subject_val|default:'' }}"
                 placeholder="e.g. Subscription Plan" autofocus>
        </div>

        <div class="form-field">
          <label class="form-label" for="ct_message">Message</label>
          <textarea id="ct_message" name="message" rows="5" maxlength="2000" required
                    class="form-control form-control--polish"
                    placeholder="Describe what you need…">{{ message_val|default:'' }}</textarea>
        </div>

        <p class="cm-sub" style="margin:.25rem 0 1rem;">
          Sent as <strong>{{ request.user.name|default:request.user.username }}</strong>
          · {{ business.business_name }}
        </p>

        <div class="cm-actions">
          <a href="{{ request.session.return_to|default:list_fallback }}" class="btn btn-light">Cancel</a>
          <button type="submit" class="btn cm-btn cm-btn--success"><i class="bi bi-send-fill"></i> Send message</button>
        </div>
      </form>

    </div>
  </div>
</div>
