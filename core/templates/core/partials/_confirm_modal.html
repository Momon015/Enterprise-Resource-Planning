{% load humanize %}
<div class="quickview__panel cm-panel">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">
    <div class="card-body">

      <div class="cm-head">
        {% if cm_image %}
        <div class="cm-thumb product-img-panel"><img src="{{ cm_image }}" alt=""></div>
        {% else %}
        <div class="cm-thumb cm-thumb--muted"><i class="bi {{ cm_icon|default:'bi-archive' }}"></i></div>
        {% endif %}

        <div>
          <div class="cm-title">{{ cm_title }}</div>
          {% if cm_subtitle %}<div class="cm-sub"{% if cm_sub_color %} style="color:{{ cm_sub_color }};font-weight:700;"{% endif %}>{{ cm_subtitle }}</div>{% endif %}
        </div>
      </div>

      {% if cm_note %}<p class="cm-note cm-note--{{ cm_tone|default:'warning' }}">{{ cm_note|safe }}</p>{% endif %}

      <form method="POST" hx-post="{{ cm_action }}" hx-swap="none">
        {% csrf_token %}
        <div class="cm-actions">
          <button type="button" class="btn btn-outline-secondary" data-quickview-close>{{ cm_cancel|default:'Cancel' }}</button>
          <button type="submit" class="btn cm-btn cm-btn--{{ cm_tone|default:'warning' }}">
            <i class="bi {{ cm_btn_icon|default:'bi-archive-fill' }}"></i> {{ cm_label|default:'Confirm' }}
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
