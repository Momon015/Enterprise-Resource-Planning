<div id="cart-strip" class="cart-strip">
  <div class="cart-strip-info">
    <i class="bi bi-cart3"></i>
    <span class="cart-strip-count">{{ cart_items|default:0 }} item{{ cart_items|pluralize }}</span>
    <span class="cart-strip-sep">·</span>
    <span class="cart-strip-total">₱{{ total|default:"0.00"|floatformat:2|intcomma }}</span>
  </div>
  <div class="cart-strip-actions">
    {% if cart_items %}
      <a href="{% url 'view-sale' business_slug=current_business.slug %}" class="btn btn-primary btn-xs">
        <i class="bi bi-arrow-right-circle"></i> Checkout
      </a>
      {% include 'core/partials/_cart_clear.html' %}
    {% else %}
      <span class="cart-strip-empty">Empty</span>
    {% endif %}
  </div>
</div>
