<div class="quickview__panel cm-panel">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">
    <div class="card-body">

      <div class="cm-head">
        <div class="cm-thumb cm-thumb--muted"><i class="bi bi-person-fill"></i></div>
        <div>
          <div class="cm-title">Edit profile</div>
          <div class="cm-sub">Update your name and contact details</div>
        </div>
      </div>

      <form hx-post="{% url 'user-edit-profile' user_id=request.user.id slug=request.user.slug %}"
            hx-target="#confirmBody" hx-swap="innerHTML" autocomplete="off">
        {% csrf_token %}
        <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true"
               style="position:absolute;left:-9999px;width:1px;height:1px;">

        {% if form.non_field_errors %}<p class="cm-note cm-note--danger" style="margin-top:0;">{{ form.non_field_errors|striptags }}</p>{% endif %}

        {% for field in form %}
        <div class="form-field">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="cm-field-error">{{ field.errors|striptags }}</div>{% endif %}
        </div>
        {% endfor %}

        <div class="cm-actions" style="margin-top:1rem;">
          <button type="button" class="btn btn-outline-secondary" data-quickview-close>Cancel</button>
          <button type="submit" class="btn cm-btn cm-btn--success"><i class="bi bi-check-circle"></i> Save changes</button>
        </div>
      </form>

    </div>
  </div>
</div>

<style>
  /* Birthday = typed Day · Month dropdown · typed Year (no native calendar) */
  /* Keep .form-field a normal block so its spacing matches the other fields; */
  /* lay the three equal boxes out inline on one row, label on its own line.  */
  /* Full-width but still inline-block like every other label, so the gap ABOVE
     it matches the other fields exactly; width:100% pushes the boxes to the next line. */
  #confirmBody .cm-card .form-field:has([name^="birthday_"]) > .form-label {
    width:100%;
  }
  #confirmBody .cm-card [name^="birthday_"] {
    display:inline-block;
    width:calc((100% - 1rem) / 3);   /* 3 boxes + two .5rem gaps = 100% */
    margin-right:.5rem;
    vertical-align:top;
  }
  #confirmBody .cm-card input[name="birthday_2"] { margin-right:0; }  /* Year = last box */
  /* Hide the number-spinner arrows — typing only */
  #confirmBody .cm-card input[name^="birthday_"]::-webkit-outer-spin-button,
  #confirmBody .cm-card input[name^="birthday_"]::-webkit-inner-spin-button {
    -webkit-appearance:none; margin:0;
  }
  #confirmBody .cm-card input[name^="birthday_"] { -moz-appearance:textfield; }
</style>

<script>
  /* Sanitize Day/Year inputs: digits only, trimmed to their max length. */
  (function () {
    var body = document.getElementById('confirmBody');
    if (!body) return;
    ['birthday_0', 'birthday_2'].forEach(function (name) {  /* Day, Year */
      var el = body.querySelector('input[name="' + name + '"]');
      if (!el) return;
      var max = parseInt(el.getAttribute('maxlength') || '4', 10);
      el.addEventListener('input', function () {
        el.value = el.value.replace(/\D/g, '').slice(0, max);
      });
    });
  })();
</script>
