<div class="quickview__panel cm-panel">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">
    <div class="card-body">

      <div class="cm-head">
        <div class="cm-thumb cm-thumb--muted"><i class="bi bi-gift-fill"></i></div>
        <div>
          <div class="cm-title">Start your free trial</div>
          <div class="cm-sub">14 days free · no card required</div>
        </div>
      </div>

      <p class="cm-note cm-note--warning" style="margin-top:0;">
        Try Premium or Pro free for 14 days. It switches back to <strong>Free</strong> automatically when the trial ends — nothing to cancel.
      </p>

      <form method="post" action="{% url 'subscription-start-trial' business_slug=business.slug %}">
        {% csrf_token %}
        <input type="hidden" name="target_business_id" value="{{ target_business_id }}">
        <div class="cm-trial-options">
          <button type="submit" name="plan" value="pro" class="btn cm-btn cm-btn--success cm-trial-btn">
            <span><i class="bi bi-lightning-charge-fill"></i> Start Pro Trial</span>
            <small>Most features</small>
          </button>
          <button type="submit" name="plan" value="premium" class="btn cm-btn-ghost-success cm-trial-btn">
            <span><i class="bi bi-lightning-charge"></i> Start Premium Trial</span>
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
