<div class="quickview__panel cm-panel">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">
    <div class="card-body">

      <div class="cm-head">
        <div class="cm-thumb cm-thumb--muted"><i class="bi bi-key-fill"></i></div>
        <div>
          <div class="cm-title">Change password</div>
          <div class="cm-sub">Enter your current password, then a new one</div>
        </div>
      </div>

      <form hx-post="{% url 'user-edit-password' %}" hx-target="#confirmBody" hx-swap="innerHTML" autocomplete="off">
        {% csrf_token %}
        <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true"
               style="position:absolute;left:-9999px;width:1px;height:1px;">

        {% if form.non_field_errors %}<p class="cm-note cm-note--danger" style="margin-top:0;">{{ form.non_field_errors|striptags }}</p>{% endif %}

        {% for field in form %}
        <div class="form-field">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          <div class="cm-pass-wrap">
            {{ field }}
            <button type="button" class="cm-pass-toggle" aria-label="Show password" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          {% if field.errors %}<div class="cm-field-error">{{ field.errors|striptags }}</div>{% endif %}
        </div>
        {% endfor %}


        <div class="cm-actions" style="margin-top:1rem;">
          <button type="submit" class="btn cm-btn cm-btn--success"><i class="bi bi-check-circle"></i> Update password</button>
        </div>
      </form>

    </div>
  </div>
</div>
