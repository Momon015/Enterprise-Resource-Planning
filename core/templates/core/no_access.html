{% extends "main.html" %}
{% block content %}

<div class="page-wrapper">
  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center;">
    
    <div style="width:80px; height:80px; background:var(--danger-light); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1.5rem;">
      <i class="bi bi-lock-fill" style="font-size:2rem; color:var(--danger);"></i>
    </div>

    <h3 style="font-weight:700; color:var(--text); margin-bottom:0.5rem;">Access Restricted</h3>
    <p style="color:var(--muted); font-size:0.9rem; max-width:380px; margin-bottom:2rem;">
      This page is only available to the account owner. Please contact your owner if you need access.
    </p>

    <div style="display:flex; gap:0.75rem;">
      <a href="{% url 'product-list' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-house sl-me-1"></i> Go to Products
      </a>
      <a href="{% url 'view-sale' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-cart-plus sl-me-1"></i> New Sale
      </a>
    </div>

  </div>
</div>

{% endblock content %}
