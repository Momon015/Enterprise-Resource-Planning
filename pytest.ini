[pytest]
DJANGO_SETTINGS_MODULE = SalesAndInventorySystem.settings
python_files = test_*.py
# No testpaths — tests now live inside each app (subscription/tests/, …) alongside the
# shared tests/factories.py. norecursedirs keeps discovery out of the venv and front-end
# so pytest doesn't try to collect site-packages' own test suites.
norecursedirs = env .git frontend static media node_modules *.egg
addopts = --tb=short -q
