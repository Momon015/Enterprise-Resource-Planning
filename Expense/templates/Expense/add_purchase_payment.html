{% extends 'main.html' %}

{% block content %}
<div class="add-purchase-payment">
    <h1>Record Payment</h1>
    <p>
        For: <strong>{{ purchase.reference }}</strong> ·
        Total: ₱{{ purchase.total_cost|floatformat:2 }} ·
        Outstanding: <strong>₱{{ outstanding|floatformat:2 }}</strong>
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" name="amount" step="0.01" min="0.01"
                   placeholder="0.00" required autofocus>
            <small>Outstanding: ₱{{ outstanding|floatformat:2 }}</small>
        </div>

        <div class="form-group">
            <label for="method">Method</label>
            <select name="method" required>
                {% for value, label in method_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="note">Reference / Note (optional)</label>
            <input type="text" name="note" maxlength="255"
                   placeholder="e.g. GCash ref 9821-AKJ4, Supplier OR #00123">
        </div>

        <button type="submit">Record Payment</button>
        <a href="{% url 'purchase-detail' business_slug=current_business.slug purchase_id=purchase.id %}">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
