<div class="quickview__panel cm-panel cm-panel--form cm-panel--scroll">
  <button type="button" class="quickview__close" data-quickview-close aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <div class="card cm-card">

    {# fixed header #}
    <div class="cm-card__head">
      <div class="cm-head" style="margin-bottom:0;">
        <div class="cm-thumb cm-thumb--muted"><span class="cm-thumb__ph" id="supf-initials">??</span></div>
        <div>
          <div class="cm-title">New Supplier</div>
          <div class="cm-sub">Add a supplier for purchase tracking.</div>
        </div>
      </div>
    </div>

    <form id="supplierForm" method="POST"
          action="{% url 'supplier-create' business_slug=current_business.slug %}"
          hx-post="{% url 'supplier-create' business_slug=current_business.slug %}"
          hx-target="#confirmBody" hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          enctype="multipart/form-data" autocomplete="off" novalidate>
      {% csrf_token %}

      {# scrollable body #}
      <div class="cm-card__body">
        {% include 'Supplier/_supplier_form_fields.html' %}
      </div>

      {# fixed footer #}
      <div class="cm-card__foot">
        <button type="button" class="btn btn-outline-secondary" data-quickview-close>Cancel</button>
        <button type="submit" class="btn cm-btn cm-btn--success">
          <i class="bi bi-check-circle sl-me-1"></i> Save Supplier
        </button>
      </div>
    </form>

  </div>
</div>

<script>
  (function () {
    var name = document.getElementById('{{ form.name.id_for_label }}');
    var ph = document.getElementById('supf-initials');
    if (!name || !ph) return;
    name.addEventListener('input', function () {
      var v = name.value.trim();
      ph.textContent = v ? v.slice(0, 2).toUpperCase() : '??';
    });
  })();
</script>
